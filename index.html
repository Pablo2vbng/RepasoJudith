<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joc de les Capitals del Món</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-color: #1d1d1f;
            --accent-color: #0071e3;
            --accent-hover: #0077ed;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 550px;
            width: 90%;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        p {
            color: #86868b;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .continent-section {
            background-color: #f5f5f7;
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .continent-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 480px) {
            .modes-grid {
                grid-template-columns: 1fr;
            }
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 0.8rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(0, 113, 227, 0.15);
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: #ffffff;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background-color: rgba(0, 113, 227, 0.05);
            transform: translateY(-1px);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #a1a1a6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Repassem les Capitals! 🌍</h1>
        <p>Tria un continent i el teu mode de joc preferit.</p>
        
        <!-- SECCIÓ ÀSIA -->
        <div class="continent-section">
            <div class="continent-title">🌏 Continent d'Àsia</div>
            <div class="modes-grid">
                <a href="asia.html" class="btn">Opció Múltiple (Test)</a>
                <a href="asia_escriure.html" class="btn btn-secondary">Escriure la Capital</a>
            </div>
        </div>

        <!-- SECCIÓ ÀFRICA -->
        <div class="continent-section">
            <div class="continent-title">🌍 Continent d'Àfrica</div>
            <div class="modes-grid">
                <a href="africa.html" class="btn">Opció Múltiple (Test)</a>
                <a href="africa_escriure.html" class="btn btn-secondary">Escriure la Capital</a>
            </div>
        </div>

        <div class="footer-note">
            Dissenyat per a aprendre i posar-se a prova.
        </div>
    </div>

</body>
</html>
